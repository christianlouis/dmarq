name: CI

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}-${{ github.event.inputs.release_ref || 'branch' }}
  cancel-in-progress: true

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:
    inputs:
      release_ref:
        description: Git ref to build, for example v1.8.4
        required: false
        type: string
      release_tag:
        description: Release image tag to publish, for example v1.8.4
        required: false
        type: string
      promote_stable:
        description: Promote the verified image to docker-stable and stable
        required: false
        default: false
        type: boolean
      deploy_gitops:
        description: Also update GitOps manifests for this manually selected release
        required: false
        default: false
        type: boolean
  schedule:
    # Weekly security scan on Mondays at 00:00 UTC
    - cron: '0 0 * * 1'

env:
  K8S_STATE_REPO: christianlouis/k8s-cluster-state

jobs:
  # ── Stage 1: Lint (gates everything else) ────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Verify Docker Compose configuration contract
        run: |
          ./scripts/bootstrap-docker-env.sh
          ./scripts/verify-docker-compose.sh

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install linting tools
        run: |
          python -m pip install --upgrade pip
          pip install black isort flake8 pylint
          cd backend && pip install -r requirements.txt

      - name: Auto-format with Black and isort
        run: |
          black backend/app
          isort backend/app

      - name: Black – format check
        run: black --check backend/app

      - name: isort – import order check
        run: isort --check-only backend/app

      - name: Flake8
        run: flake8 backend/app

      - name: Pylint
        run: pylint backend/app
        continue-on-error: true

  # ── Stage 2 (parallel): Test, Security, CodeQL, Dependency Review ────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          cd backend && pip install -r requirements.txt

      - name: Run tests with coverage
        run: |
          cd backend
          pytest --cov=app --cov-report=xml --cov-report=term-missing --cov-fail-under=80

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./backend/coverage.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  docker-compose-smoke:
    name: Docker Compose Greenfield Smoke
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate and render a new standalone environment
        run: |
          python3 scripts/dmarqctl.py \
            --config docs/deployment/examples/agent-install.compose.json \
            --json preflight
          python3 scripts/dmarqctl.py \
            --config docs/deployment/examples/agent-install.compose.json \
            --json bootstrap --no-start

      - name: Build and start the documented stack
        run: >-
          docker compose
          -f docker-compose.yml
          -f docker-compose.build.yml
          up -d --build --wait

      - name: Verify host, API, database isolation, and image contract
        run: |
          curl -fsS http://127.0.0.1:8080/healthz
          curl -fsS http://127.0.0.1:8080/api/v1/health
          ./scripts/verify-docker-compose.sh
          python3 scripts/dmarqctl.py \
            --config docs/deployment/examples/agent-install.compose.json \
            --json bootstrap --setup-existing
          python3 scripts/verify-greenfield-product.py --configured
          python3 scripts/dmarqctl.py \
            --config docs/deployment/examples/agent-install.compose.json \
            --json status
          docker image inspect \
            --format '{{ json .Config.ExposedPorts }}' dmarq-app:local | grep -q '8080/tcp'

      - name: Recreate the app and verify persistent product state
        run: |
          docker compose \
            -f docker-compose.yml \
            -f docker-compose.build.yml \
            up -d --force-recreate --wait app
          python3 scripts/dmarqctl.py \
            --config docs/deployment/examples/agent-install.compose.json \
            --json bootstrap --setup-existing
          python3 scripts/verify-greenfield-product.py --verify-existing
          python3 scripts/dmarqctl.py \
            --config docs/deployment/examples/agent-install.compose.json \
            --json status

      - name: Show logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml -f docker-compose.build.yml logs --no-color --tail=300

      - name: Remove the disposable stack
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.build.yml down -v --remove-orphans

  agentic-kubernetes:
    name: Agentic Helm And Terraform
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.19.0

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.12.2
          terraform_wrapper: false

      - name: Validate Helm and Terraform packaging
        run: |
          helm lint deploy/helm/dmarq -f deploy/helm/dmarq/ci/test-values.yaml
          helm template dmarq deploy/helm/dmarq \
            --namespace dmarq \
            -f deploy/helm/dmarq/ci/test-values.yaml \
            > /tmp/dmarq.yaml
          terraform fmt -recursive -check deploy/terraform
          terraform -chdir=deploy/terraform/modules/kubernetes-dmarq init -backend=false
          terraform -chdir=deploy/terraform/modules/kubernetes-dmarq validate
          terraform -chdir=deploy/terraform/examples/kubernetes init -backend=false
          terraform -chdir=deploy/terraform/examples/kubernetes validate

      - name: Create disposable Kubernetes cluster
        uses: helm/kind-action@v1
        with:
          cluster_name: dmarq-ci

      - name: Create test-only secret boundary
        run: |
          kubectl create namespace dmarq
          kubectl --namespace dmarq create secret generic dmarq \
            --from-literal=DATABASE_URL='postgresql://dmarq:test-database-password@dmarq-postgresql:5432/dmarq' \
            --from-literal=SECRET_KEY='ci-only-not-a-secret-ci-only-not-a-secret' \
            --from-literal=ADMIN_API_KEY='ci-only-not-an-api-key-ci-only-not-an-api-key' \
            --from-literal=POSTGRES_DB='dmarq' \
            --from-literal=POSTGRES_USER='dmarq' \
            --from-literal=POSTGRES_PASSWORD='test-database-password'

      - name: Apply, verify, upgrade, and check drift
        working-directory: deploy/terraform/tests/kind
        run: |
          terraform init -backend=false
          terraform apply -auto-approve
          kubectl --namespace dmarq rollout status deployment/dmarq --timeout=10m
          kubectl --namespace dmarq port-forward service/dmarq 18080:80 >/tmp/dmarq-port-forward.log 2>&1 &
          PORT_FORWARD_PID=$!
          trap 'kill "$PORT_FORWARD_PID" 2>/dev/null || true' EXIT
          for attempt in $(seq 1 30); do
            if curl --fail --silent http://127.0.0.1:18080/healthz; then
              break
            fi
            if [ "$attempt" -eq 30 ]; then
              cat /tmp/dmarq-port-forward.log
              exit 1
            fi
            sleep 2
          done
          curl --fail --silent http://127.0.0.1:18080/api/v1/setup/status \
            | grep -q '"is_setup_complete":true'
          terraform apply -auto-approve -var='project_name=DMARQ CI Upgrade'
          terraform plan -detailed-exitcode -var='project_name=DMARQ CI Upgrade'

      - name: Destroy disposable release
        if: always()
        working-directory: deploy/terraform/tests/kind
        run: |
          if [ -d .terraform ]; then
            terraform destroy -auto-approve -var='project_name=DMARQ CI Upgrade'
          fi
          kubectl --namespace dmarq get all || true

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: lint
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          pip install bandit pip-audit
          cd backend && pip install -r requirements.txt

      - name: Bandit – Python security linter
        run: bandit -r backend/app -f json -o bandit-report.json
        continue-on-error: true

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-security-report
          path: bandit-report.json

      - name: pip-audit – dependency vulnerability check
        run: pip-audit --requirement backend/requirements.txt
        continue-on-error: true

  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    needs: lint
    # CodeQL is only meaningful on real pushes/PRs, not the weekly schedule alone
    if: github.event_name != 'schedule'
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: python
          queries: security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:python

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    needs: lint
    if: github.event_name == 'pull_request'
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate

  # ── Stage 3: Docker Build & Publish (only on main push) ──────────────────
  docker:
    name: Docker Build & Publish
    runs-on: ubuntu-latest
    needs: [test, security, docker-compose-smoke]
    if: >-
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      packages: write
    outputs:
      image: ${{ steps.verify-image.outputs.image }}
      short_sha: ${{ steps.verify-image.outputs.short_sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Checkout selected release ref
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.release_ref != ''
        env:
          RELEASE_REF: ${{ github.event.inputs.release_ref }}
        run: |
          git fetch --tags --force --depth=100 origin main
          git checkout "$RELEASE_REF"

      - name: Resolve release image tag
        id: release_ref
        env:
          IMAGE_REPOSITORY: ghcr.io/${{ github.repository }}
        run: |
          FULL_SHA=$(git rev-parse HEAD)
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          BUILD_REF=$(git symbolic-ref --short HEAD 2>/dev/null || git describe --tags --exact-match HEAD 2>/dev/null || git rev-parse --short=12 HEAD)
          BUILD_DATE=$(git show -s --format=%cI HEAD)
          echo "image=${IMAGE_REPOSITORY}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "full_sha=${FULL_SHA}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "build_ref=${BUILD_REF}" >> "$GITHUB_OUTPUT"
          echo "build_date=${BUILD_DATE}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU for multi-platform builds
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=raw,value=${{ steps.release_ref.outputs.short_sha }}
            type=raw,value=${{ github.event.inputs.release_tag }},enable=${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_tag != '' }}
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=docker-latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            DMARQ_BUILD_SHA=${{ steps.release_ref.outputs.full_sha }}
            DMARQ_BUILD_REF=${{ steps.release_ref.outputs.build_ref }}
            DMARQ_BUILD_IMAGE=${{ steps.release_ref.outputs.image }}
            DMARQ_BUILD_DATE=${{ steps.release_ref.outputs.build_date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify short SHA image tag
        id: verify-image
        run: |
          IMAGE="${{ steps.release_ref.outputs.image }}"
          verify_platforms() {
            docker buildx imagetools inspect --raw "$IMAGE" 2>/dev/null |
              jq -e '
                [.manifests[]? | select(.platform.os == "linux") | .platform.architecture] as $architectures
                | ($architectures | index("amd64")) != null
                  and ($architectures | index("arm64")) != null
              ' >/dev/null
          }
          for attempt in 1 2 3 4 5; do
            if verify_platforms; then
              echo "image=$IMAGE" >> "$GITHUB_OUTPUT"
              echo "short_sha=${{ steps.release_ref.outputs.short_sha }}" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            sleep $((attempt * 5))
          done
          echo "::error::Verified AMD64 and ARM64 image manifests did not become available in GHCR: $IMAGE"
          exit 1

  registry-image-smoke:
    name: Published Docker Image Smoke
    runs-on: ubuntu-latest
    needs: [docker]
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Checkout selected release ref
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.release_ref != ''
        env:
          RELEASE_REF: ${{ github.event.inputs.release_ref }}
        run: |
          git fetch --tags --force --depth=100 origin main
          git checkout "$RELEASE_REF"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Start the published immutable image
        env:
          VERIFIED_IMAGE: ${{ needs.docker.outputs.image }}
        run: |
          ./scripts/bootstrap-docker-env.sh
          sed -i "s|^DMARQ_IMAGE=.*|DMARQ_IMAGE=\"${VERIFIED_IMAGE}\"|" .env
          docker compose pull
          docker compose up -d --wait

      - name: Verify release identity and DMARC ingestion
        env:
          EXPECTED_SHA: ${{ needs.docker.outputs.short_sha }}
        run: |
          curl -fsS http://127.0.0.1:8080/healthz
          curl -fsS http://127.0.0.1:8080/api/v1/health
          python3 scripts/check_release_rollout.py \
            --base-url http://127.0.0.1:8080 \
            --expected-sha "$EXPECTED_SHA"
          curl -fsS \
            -F 'file=@backend/app/tests/fixtures/dmarc_aggregate/rfc7489-google.xml;type=application/xml' \
            http://127.0.0.1:8080/api/v1/reports/upload \
            | grep -q '"success":true'
          curl -fsS http://127.0.0.1:8080/api/v1/domains/domains \
            | grep -q '"name":"example.com"'

      - name: Show logs on failure
        if: failure()
        run: docker compose logs --no-color --tail=300

      - name: Remove the disposable stack
        if: always()
        run: docker compose down -v --remove-orphans

  promote-docker-stable:
    name: Promote And Smoke docker-stable
    runs-on: ubuntu-latest
    needs: [docker, registry-image-smoke]
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.promote_stable == 'true'
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Checkout selected release ref
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.release_ref != ''
        env:
          RELEASE_REF: ${{ github.event.inputs.release_ref }}
        run: |
          git fetch --tags --force --depth=100 origin main
          git checkout "$RELEASE_REF"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Promote the verified digest
        env:
          SOURCE_IMAGE: ${{ needs.docker.outputs.image }}
          IMAGE_REPOSITORY: ghcr.io/${{ github.repository }}
        run: |
          docker buildx imagetools create \
            --tag "${IMAGE_REPOSITORY}:docker-stable" \
            --tag "${IMAGE_REPOSITORY}:stable" \
            "$SOURCE_IMAGE"
          docker buildx imagetools inspect "${IMAGE_REPOSITORY}:docker-stable"

      - name: Start and verify docker-stable
        env:
          IMAGE_REPOSITORY: ghcr.io/${{ github.repository }}
          EXPECTED_SHA: ${{ needs.docker.outputs.short_sha }}
        run: |
          ./scripts/bootstrap-docker-env.sh
          sed -i "s|^DMARQ_IMAGE=.*|DMARQ_IMAGE=\"${IMAGE_REPOSITORY}:docker-stable\"|" .env
          docker compose pull
          docker compose up -d --wait
          curl -fsS http://127.0.0.1:8080/healthz
          python3 scripts/check_release_rollout.py \
            --base-url http://127.0.0.1:8080 \
            --expected-sha "$EXPECTED_SHA"

      - name: Show logs on failure
        if: failure()
        run: docker compose logs --no-color --tail=300

      - name: Remove the disposable stack
        if: always()
        run: docker compose down -v --remove-orphans

  # ── Stage 4: GitOps – update non-production k8s manifests ────────────────
  update-k8s-manifest:
    name: Update K8s Manifests
    runs-on: ubuntu-latest
    needs: [docker, registry-image-smoke]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_gitops == 'true')
    permissions:
      contents: read

    steps:
      - name: Compute image tag
        id: tag
        run: |
          test -n "${{ needs.docker.outputs.image }}"
          echo "image=${{ needs.docker.outputs.image }}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${{ needs.docker.outputs.short_sha }}" >> "$GITHUB_OUTPUT"
          echo "image_pattern=^ghcr\\.io/${{ github.repository }}:" >> "$GITHUB_OUTPUT"

      - name: Check if GH_PAT is configured and has repo access
        id: pat-check
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          if [ -z "$GH_PAT" ]; then
            echo "::warning::GH_PAT secret is not configured. Skipping k8s manifest update."
            echo "available=false" >> "$GITHUB_OUTPUT"
          else
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer $GH_PAT" \
              "https://api.github.com/repos/${{ env.K8S_STATE_REPO }}")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "available=true" >> "$GITHUB_OUTPUT"
            else
              echo "::warning::GH_PAT does not have access to ${{ env.K8S_STATE_REPO }} (HTTP $HTTP_CODE). Skipping k8s manifest update."
              echo "available=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Confirm source ref is still current
        id: source-ref
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" != "push" ] || [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "current=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! latest_sha="$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/commits/main" | jq -r '.sha')"; then
            echo "::notice::Skipping GitOps update because the current main SHA could not be resolved."
            echo "current=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$latest_sha" != "${{ github.sha }}" ]; then
            echo "::notice::Skipping GitOps update because main advanced to ${latest_sha} after this run started."
            echo "current=false" >> "$GITHUB_OUTPUT"
          else
            echo "current=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout k8s-cluster-state
        if: steps.pat-check.outputs.available == 'true' && steps.source-ref.outputs.current == 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ env.K8S_STATE_REPO }}
          token: ${{ secrets.GH_PAT }}
          path: k8s-cluster-state
          ref: main

      - name: Update image tags in GitOps manifests
        if: steps.pat-check.outputs.available == 'true' && steps.source-ref.outputs.current == 'true'
        uses: mikefarah/yq@v4.44.6
        env:
          IMAGE: ${{ steps.tag.outputs.image }}
          IMAGE_PATTERN: ${{ steps.tag.outputs.image_pattern }}
        with:
          cmd: |
            for manifest in \
              k8s-cluster-state/apps/dmarq/greenfield-preprod/dmarq-stack.yaml \
              k8s-cluster-state/apps/dmarq/greenfield-demo/dmarq-stack.yaml \
              k8s-cluster-state/apps/dmarq/greenfield-demo-multi/dmarq-stack.yaml
            do
              test -f "$manifest"
              yq -i '(.. | select(tag == "!!str") | select(test(strenv(IMAGE_PATTERN)))) = strenv(IMAGE)' \
                "$manifest"
            done

      - name: Commit and push manifest update
        if: steps.pat-check.outputs.available == 'true' && steps.source-ref.outputs.current == 'true'
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          cd k8s-cluster-state
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_PAT}@github.com/${{ env.K8S_STATE_REPO }}.git"
          git add \
            apps/dmarq/greenfield-preprod/dmarq-stack.yaml \
            apps/dmarq/greenfield-demo/dmarq-stack.yaml \
            apps/dmarq/greenfield-demo-multi/dmarq-stack.yaml
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore(gitops): update dmarq nonprod images to ${{ steps.tag.outputs.short_sha }}"
            for attempt in 1 2 3; do
              if git push; then
                exit 0
              fi
              echo "GitOps push failed on attempt ${attempt}; rebasing onto latest main before retry."
              git fetch origin main
              if ! git rebase origin/main; then
                echo "::error::Failed to rebase nonproduction GitOps manifest update onto latest main."
                git rebase --abort || true
                exit 1
              fi
            done
            echo "::error::Failed to push nonproduction GitOps manifest update after rebasing."
            exit 1
          fi

  # ── Stage 4b: GitOps – gated production manifest promotion ───────────────
  promote-prod-k8s-manifest:
    name: Promote Production K8s Manifest
    runs-on: ubuntu-latest
    needs: [docker, registry-image-smoke]
    if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || (github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_gitops == 'true')
    environment: dmarq-production-gitops
    permissions:
      contents: read

    steps:
      - name: Compute image tag
        id: tag
        run: |
          test -n "${{ needs.docker.outputs.image }}"
          echo "image=${{ needs.docker.outputs.image }}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${{ needs.docker.outputs.short_sha }}" >> "$GITHUB_OUTPUT"
          echo "image_pattern=^ghcr\\.io/${{ github.repository }}:" >> "$GITHUB_OUTPUT"

      - name: Check if GH_PAT is configured and has repo access
        id: pat-check
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          if [ -z "$GH_PAT" ]; then
            echo "::warning::GH_PAT secret is not configured. Skipping production k8s manifest update."
            echo "available=false" >> "$GITHUB_OUTPUT"
          else
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              -H "Authorization: Bearer $GH_PAT" \
              "https://api.github.com/repos/${{ env.K8S_STATE_REPO }}")
            if [ "$HTTP_CODE" = "200" ]; then
              echo "available=true" >> "$GITHUB_OUTPUT"
            else
              echo "::warning::GH_PAT does not have access to ${{ env.K8S_STATE_REPO }} (HTTP $HTTP_CODE). Skipping production k8s manifest update."
              echo "available=false" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Confirm source ref is still current
        id: source-ref
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" != "push" ] || [ "${{ github.ref }}" != "refs/heads/main" ]; then
            echo "current=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if ! latest_sha="$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/commits/main" | jq -r '.sha')"; then
            echo "::notice::Skipping GitOps update because the current main SHA could not be resolved."
            echo "current=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "$latest_sha" != "${{ github.sha }}" ]; then
            echo "::notice::Skipping GitOps update because main advanced to ${latest_sha} after this run started."
            echo "current=false" >> "$GITHUB_OUTPUT"
          else
            echo "current=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout k8s-cluster-state
        if: steps.pat-check.outputs.available == 'true' && steps.source-ref.outputs.current == 'true'
        uses: actions/checkout@v4
        with:
          repository: ${{ env.K8S_STATE_REPO }}
          token: ${{ secrets.GH_PAT }}
          path: k8s-cluster-state
          ref: main

      - name: Update production image tag in GitOps manifest
        if: steps.pat-check.outputs.available == 'true' && steps.source-ref.outputs.current == 'true'
        uses: mikefarah/yq@v4.44.6
        env:
          IMAGE: ${{ steps.tag.outputs.image }}
          IMAGE_PATTERN: ${{ steps.tag.outputs.image_pattern }}
        with:
          cmd: |
            manifest="k8s-cluster-state/apps/dmarq/prod/dmarq-stack.yaml"
            test -f "$manifest"
            yq -i '(.. | select(tag == "!!str") | select(test(strenv(IMAGE_PATTERN)))) = strenv(IMAGE)' \
              "$manifest"

      - name: Commit and push production manifest update
        if: steps.pat-check.outputs.available == 'true' && steps.source-ref.outputs.current == 'true'
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        run: |
          cd k8s-cluster-state
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${GH_PAT}@github.com/${{ env.K8S_STATE_REPO }}.git"
          git add apps/dmarq/prod/dmarq-stack.yaml
          if git diff --staged --quiet; then
            echo "No production changes to commit"
          else
            git commit -m "chore(gitops): promote dmarq prod image to ${{ steps.tag.outputs.short_sha }}"
            for attempt in 1 2 3; do
              if git push; then
                exit 0
              fi
              echo "GitOps push failed on attempt ${attempt}; rebasing onto latest main before retry."
              git fetch origin main
              if ! git rebase origin/main; then
                echo "::error::Failed to rebase production GitOps manifest update onto latest main."
                git rebase --abort || true
                exit 1
              fi
            done
            echo "::error::Failed to push production GitOps manifest update after rebasing."
            exit 1
          fi
