<!DOCTYPE html>
<html lang="en" data-theme="dmarqlight" class="dark:data-theme-dmarqdark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DMARQ - DMARC Monitoring{% endblock %}</title>

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/static/img/favicon.ico">
    <link rel="icon" type="image/png" sizes="32x32" href="/static/img/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/static/img/favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="/static/img/apple-touch-icon.png">

    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&family=Open+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS & DaisyUI via CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.24/dist/full.css" rel="stylesheet" type="text/css"/>

    <!-- Alpine.js for interactivity -->
    <script src="/static/js/pages.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
    <link href="/static/css/page-utilities.css" rel="stylesheet" type="text/css"/>

    {% block head %}{% endblock %}
</head>
<body class="min-h-screen bg-[#f4f3f2] font-body antialiased text-[#07071f]">
    <header class="fixed inset-x-0 top-0 z-40 flex h-24 items-center bg-[#272a5f] px-5 text-white shadow-sm md:px-10"
            x-data="userMenu()" x-init="loadUser()">
        <div class="flex flex-1 items-center">
            <a href="/" class="inline-flex items-center gap-4" aria-label="DMARQ Dashboard">
                <span class="grid h-12 w-12 place-items-center bg-[#272a5f]" aria-hidden="true">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-9 w-9" viewBox="0 0 48 48" fill="none" aria-hidden="true" focusable="false">
                        <path d="M24 4 39 9v12.4c0 9.9-6.1 17.3-15 21.9C15.1 38.7 9 31.3 9 21.4V9l15-5Z" stroke="currentColor" stroke-width="3.5" fill="none"/>
                        <circle cx="24" cy="23" r="9" stroke="currentColor" stroke-width="3.5"/>
                        <path d="m30 29 5 5" stroke="currentColor" stroke-width="3.5" stroke-linecap="round"/>
                    </svg>
                </span>
                <span class="text-3xl font-bold tracking-normal">DMARQ</span>
            </a>
        </div>
        <div class="flex items-center gap-3">
            <div class="hidden min-w-48 md:block" x-show="workspaces.length > 0" x-cloak>
                <label class="sr-only" for="workspace-switcher">Workspace</label>
                <select id="workspace-switcher"
                        class="select select-sm w-full border-white/30 bg-white/95 text-[#272a5f]"
                        x-model="selectedWorkspaceId"
                        @change="selectWorkspace($event.target.value)">
                    <template x-for="workspace in workspaces" :key="workspace.id">
                        <option :value="workspace.id"
                                :disabled="!workspace.active"
                                x-text="workspaceLabel(workspace)"></option>
                    </template>
                </select>
            </div>
            <nav class="hidden items-center gap-1 text-sm font-semibold lg:flex" aria-label="Primary">
                <a href="/" class="rounded-md px-3 py-2 text-white/90 hover:bg-white/10">Dashboard</a>
                <a href="/domains" class="rounded-md px-3 py-2 text-white/80 hover:bg-white/10">Domains</a>
                <a href="/reports" class="rounded-md px-3 py-2 text-white/80 hover:bg-white/10">Reports</a>
                <a href="/forensics" class="rounded-md px-3 py-2 text-white/80 hover:bg-white/10">Forensics</a>
                <a href="/tls-reports" class="rounded-md px-3 py-2 text-white/80 hover:bg-white/10">TLS</a>
                <a href="/members" class="rounded-md px-3 py-2 text-white/80 hover:bg-white/10">Members</a>
                <a href="/onboarding" class="rounded-md px-3 py-2 text-white/80 hover:bg-white/10">Onboarding</a>
            </nav>
            <div>
                <template x-if="user">
                    <div class="dropdown dropdown-end">
                        <label tabindex="0" class="btn btn-ghost btn-circle avatar placeholder h-12 w-12 rounded-full border border-white/40 bg-white/90 text-[#272a5f] hover:bg-white">
                            <div class="rounded-full w-10">
                                <template x-if="user.picture">
                                    <img :src="user.picture" :alt="user.full_name || user.email" class="h-10 w-10 rounded-full object-cover">
                                </template>
                                <template x-if="!user.picture">
                                    <span class="text-sm font-semibold" x-text="(user.full_name || user.email || '?')[0].toUpperCase()"></span>
                                </template>
                            </div>
                        </label>
                        <ul tabindex="0" class="menu menu-sm dropdown-content mt-3 z-[1] p-2 shadow bg-base-100 text-base-content rounded-box w-56">
                            <li class="menu-title px-2 py-1">
                                <span class="text-xs font-semibold truncate" x-text="user.full_name || user.email"></span>
                                <span class="text-xs text-base-content/50 truncate" x-text="user.email" x-show="user.full_name"></span>
                            </li>
                            <li><a href="/profile">Profile &amp; Security</a></li>
                            <li><a href="/members">Members</a></li>
                            <li><a href="/settings">Settings</a></li>
                            <li>
                                <a href="/api/v1/auth/sign-out" class="text-error">
                                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/>
                                    </svg>
                                    Sign out
                                </a>
                            </li>
                        </ul>
                    </div>
                </template>
                <template x-if="!user">
                    <a href="/login" class="btn btn-ghost btn-sm">Sign in</a>
                </template>
            </div>
        </div>
    </header>

    <aside class="fixed bottom-0 left-0 top-24 z-30 hidden w-24 flex-col items-center gap-8 bg-[#272a5f] py-10 text-white md:flex" aria-label="Section navigation">
        <a href="/" aria-label="Dashboard" title="Dashboard" class="rounded-lg p-3 text-white shadow-sm hover:bg-white/10">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 3 3 10.7V21h6v-6h6v6h6V10.7L12 3Z"/></svg>
        </a>
        <a href="/domains" aria-label="Domains" title="Domains" class="rounded-lg p-3 text-white/70 hover:bg-white/10 hover:text-white">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M4 5a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V5Zm4 2v2h8V7H8Zm0 4v2h8v-2H8Zm0 4v2h5v-2H8Z"/></svg>
        </a>
        <a href="/reports" aria-label="Reports" title="Reports" class="rounded-lg p-3 text-white/55 hover:bg-white/10 hover:text-white">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M7 3h7l5 5v13H7a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2Zm6 1.5V9h4.5L13 4.5ZM8 13h8v2H8v-2Zm0 4h6v2H8v-2Z"/></svg>
        </a>
        <a href="/forensics" aria-label="Forensics" title="Forensics" class="rounded-lg p-3 text-white/55 hover:bg-white/10 hover:text-white">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M5 4h14v16H5V4Zm3 4v2h8V8H8Zm0 4v2h8v-2H8Zm0 4v2h5v-2H8Z"/></svg>
        </a>
        <a href="/members" aria-label="Members" title="Members" class="rounded-lg p-3 text-white/55 hover:bg-white/10 hover:text-white">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M8.5 11a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Zm7 1a3 3 0 1 0 0-6 3 3 0 0 0 0 6ZM2 19.5C2 15.9 4.9 13 8.5 13S15 15.9 15 19.5V21H2v-1.5Zm12.8 1.5v-1.5c0-2-.7-3.8-1.9-5.2.8-.2 1.7-.3 2.6-.3 3 0 5.5 2.5 5.5 5.5V21h-6.2Z"/></svg>
        </a>
        <a href="/onboarding" aria-label="Onboarding" title="Onboarding" class="rounded-lg p-3 text-white/55 hover:bg-white/10 hover:text-white">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M4 4h16v4H4V4Zm0 6h7v10H4V10Zm9 0h7v4h-7v-4Zm0 6h7v4h-7v-4Z"/></svg>
        </a>
        <a href="/settings" aria-label="Settings" title="Settings" class="mt-auto rounded-lg p-3 text-white/55 hover:bg-white/10 hover:text-white">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M19.4 13.5a7.8 7.8 0 0 0 0-3l2-1.5-2-3.5-2.4 1a7.6 7.6 0 0 0-2.6-1.5L14 2h-4l-.4 3a7.6 7.6 0 0 0-2.6 1.5l-2.4-1-2 3.5 2 1.5a7.8 7.8 0 0 0 0 3l-2 1.5 2 3.5 2.4-1a7.6 7.6 0 0 0 2.6 1.5l.4 3h4l.4-3a7.6 7.6 0 0 0 2.6-1.5l2.4 1 2-3.5-2-1.5ZM12 15.5A3.5 3.5 0 1 1 12 8a3.5 3.5 0 0 1 0 7.5Z"/></svg>
        </a>
    </aside>

    <main class="min-h-screen pt-24 md:ml-24">
        <div class="p-4 md:p-6 lg:p-8">
        {% block content %}{% endblock %}
        </div>
    </main>

    <!-- Scripts -->
    {% block scripts %}{% endblock %}

    <!-- User-menu Alpine component -->
    <script>
        function userMenu() {
            return {
                user: null,
                workspaces: [],
                selectedWorkspaceId: localStorage.getItem('dmarq.selectedWorkspaceId') || '',
                async loadUser() {
                    try {
                        const res = await fetch('/api/v1/auth/me');
                        if (res.ok) {
                            this.user = await res.json();
                        }
                    } catch (_) {
                        // silently ignore – user is simply not shown
                    }
                    await this.loadWorkspaces();
                },
                async loadWorkspaces() {
                    try {
                        const res = await fetch('/api/v1/workspaces');
                        if (!res.ok) {
                            return;
                        }
                        const data = await res.json();
                        this.workspaces = data.workspaces || [];
                        const saved = String(this.selectedWorkspaceId || '');
                        const selected = this.workspaces.find((workspace) => String(workspace.id) === saved && workspace.active);
                        const fallback = this.workspaces.find((workspace) => workspace.active) || this.workspaces[0];
                        if (!selected && fallback) {
                            this.selectWorkspace(String(fallback.id));
                        } else if (selected) {
                            this.selectWorkspace(String(selected.id));
                        }
                    } catch (_) {
                        // workspace selection is optional for single-tenant installs
                    }
                },
                selectWorkspace(workspaceId) {
                    this.selectedWorkspaceId = workspaceId || '';
                    if (this.selectedWorkspaceId) {
                        localStorage.setItem('dmarq.selectedWorkspaceId', this.selectedWorkspaceId);
                    } else {
                        localStorage.removeItem('dmarq.selectedWorkspaceId');
                    }
                    window.dispatchEvent(new CustomEvent('dmarq:workspace-changed', {
                        detail: { workspaceId: this.selectedWorkspaceId },
                    }));
                },
                workspaceLabel(workspace) {
                    const prefix = workspace.organization ? `${workspace.organization.name} / ` : '';
                    const suffix = workspace.active ? '' : ' (inactive)';
                    return `${prefix}${workspace.name}${suffix}`;
                },
            };
        }
    </script>

    <script>
        (function attachWorkspaceContextToFetch() {
            const originalFetch = window.fetch;
            window.fetch = function(input, init) {
                const workspaceId = localStorage.getItem('dmarq.selectedWorkspaceId');
                const url = input instanceof URL
                    ? input.toString()
                    : (typeof input === 'string' ? input : (input && input.url) || '');
                const isApiRequest = url.startsWith('/api/') || url.startsWith(window.location.origin + '/api/');
                if (!workspaceId || !isApiRequest) {
                    return originalFetch(input, init);
                }
                const nextInit = Object.assign({}, init || {});
                const headers = new Headers(nextInit.headers || (input && input.headers) || {});
                if (!headers.has('X-DMARQ-Workspace-ID')) {
                    headers.set('X-DMARQ-Workspace-ID', workspaceId);
                }
                nextInit.headers = headers;
                return originalFetch(input, nextInit);
            };
        })();
    </script>

    <!-- Initialize theme from localStorage -->
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const darkMode = localStorage.getItem('darkMode') === 'true';
            if (darkMode) {
                document.documentElement.classList.add('dark');
                document.documentElement.setAttribute('data-theme', 'dmarqdark');
            } else {
                document.documentElement.classList.remove('dark');
                document.documentElement.setAttribute('data-theme', 'dmarqlight');
            }
        });
    </script>
</body>
</html>
