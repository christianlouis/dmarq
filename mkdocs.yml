site_name: DMARQ Documentation
site_description: Documentation for DMARQ - DMARC reporting and analysis tool
site_author: DMARQ contributors
copyright: Copyright &copy; 2026 DMARQ

repo_url: https://github.com/christianlouis/dmarq
edit_uri: edit/main/docs/
exclude_docs: |
  readthedocs/

theme:
  name: material
  logo: backend/app/static/img/monogram_light.png
  favicon: backend/app/static/img/monogram_light.png
  palette:
    primary: indigo
    accent: teal
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - content.code.annotate
    - search.highlight

extra_css:
  - css/extra.css

nav:
  - Home: index.md
  - User Guide:
    - Getting Started: user_guide/getting_started.md
    - Dashboard: user_guide/dashboard.md
    - Managing Domains: user_guide/domains.md
    - DMARC Reports: user_guide/reports.md
    - Migration: user_guide/migration.md
    - TLS Reports: user_guide/tls_reports.md
    - IMAP Integration: user_guide/imap.md
    - Microsoft 365 Integration: user_guide/microsoft365.md
    - Settings: user_guide/settings.md
  - Installation:
    - Docker Setup: deployment/docker.md
    - Greenfield Verification: deployment/greenfield-verification.md
    - Manual Installation: deployment/manual.md
    - Configuration: deployment/configuration.md
    - Secrets: deployment/secrets.md
    - Operations: deployment/operations.md
    - Backups and Restore: deployment/backups.md
    - Troubleshooting: deployment/troubleshooting.md
    - Release Checklist: deployment/release-checklist.md
  - Technical Reference:
    - API Reference: reference/api.md
    - Cloudflare Email Worker Webhook: cloudflare-email-worker-inbound-webhook.md
    - Ecosystem Integration Matrix: reference/ecosystem-integrations.md
    - Provider Integrations: reference/provider-integrations.md
    - SIEM Integrations: reference/siem-integrations.md
    - Ticketing and Chatops: reference/ticketing-chatops-integrations.md
    - Microsoft 365 Graph Connector: reference/microsoft365-graph-connector.md
    - Workspaces: reference/workspaces.md
    - Provider Demo: provider-demo.md
    - Architecture: reference/architecture.md
    - Database Schema: reference/database.md
  - Development:
    - Contributing: development/contributing.md
    - Testing: development/testing.md
    - CI/CD Pipeline: development/ci-cd.md
    - Roadmap: development/roadmap.md
    - Protocol Coverage: development/protocol-coverage.md
    - Agentic Coding: development/agents.md
    - Historical Issue Generation: development/issue_generation.md
  - FAQ: faq.md
  - Changelog: changelog.md

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            show_source: true
  - git-revision-date-localized:
      type: date

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - toc:
      permalink: true
